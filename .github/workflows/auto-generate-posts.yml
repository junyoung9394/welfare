name: Auto Generate Posts

on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일 00:00 UTC = 09:00 KST
  workflow_dispatch:      # 수동 실행 가능
    inputs:
      count:
        description: '생성할 포스트 수'
        default: '2'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COUNT=${{ github.event.inputs.count || '2' }}
          python scripts/generate_post_batch.py --count $COUNT

      - name: Regenerate sitemap & feed
        run: python scripts/generate_sitemap_feed.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ scripts/post-topics-done.txt sitemap.xml feed.xml
          git diff --cached --quiet && echo "No new posts" || git commit -m "feat: 자동 포스트 생성 $(date '+%Y-%m-%d')"
          git push
