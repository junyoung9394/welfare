name: Update Sitemap & Feed

on:
  push:
    branches: [main]
    paths:
      - 'posts/**'
      - '*.html'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate sitemap.xml and feed.xml
        run: python scripts/generate_sitemap_feed.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml feed.xml
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: auto-update sitemap.xml & feed.xml"
          git push
