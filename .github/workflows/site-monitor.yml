name: Site Health Monitor

on:
  schedule:
    - cron: '0 1 * * 1'  # 매주 월요일 01:00 UTC = 10:00 KST
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run health check
        run: python scripts/site_health_check.py > health-report.txt 2>&1
        continue-on-error: true

      - name: Print report
        run: cat health-report.txt
