plugins {
    id 'com.android.application'
}

android {
    namespace 'com.inhatc.yummynote'
    compileSdk 35

    defaultConfig {
        applicationId 'com.inhatc.yummynote'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }
}

dependencies {
    implementation 'com.google.android.gms:play-services-maps:18.2.0'
    implementation 'androidx.cardview:cardview:1.0.0'
}
